global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'castor-auth-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'castor-auth-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scheme: http
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
